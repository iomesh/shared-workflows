# Copy this file to your repo as .github/workflows/claude.yml
# then delete the old claude-review.yml to avoid duplicate triggers.
name: Claude Code
on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    uses: iomesh/shared-workflows/.github/workflows/claude-bedrock.yml@main
    secrets:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
